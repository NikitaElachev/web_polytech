{% extends 'base.html' %}
{% block content %}
<h2>Подборка: {{ collection.name }}</h2>
<a href="{{ url_for('my_collections') }}" class="btn btn-secondary btn-sm mb-3">Назад к подборкам</a>

<div class="row">
    {% for book in collection.books %}
    <div class="col-md-4 mb-3">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ book.title }}</h5>
                <p>{{ book.author }} ({{ book.year }})</p>
                <a href="{{ url_for('view_book', book_id=book.id) }}" class="btn btn-info btn-sm">Перейти к книге</a>
            </div>
        </div>
    </div>
    {% else %}
    <p>В этой подборке пока нет книг.</p>
    {% endfor %}
</div>
{% endblock %}
